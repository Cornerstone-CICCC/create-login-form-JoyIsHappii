<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Login Page</title>
  </head>
  <body>
    
    <div class="header">
      <img src="images/logo.svg" alt="Logo" class="logo" />
    </div>

    <div class="main">
      <div class="container">
        <div class="header-content">
          <h1><img src="images/log-in.svg" alt="Login Icon">Login</h1>
          <p>Insert your information below.</p>
        </div>

        <form id="login-form" action="">
          <div class="input-group">
            <label for="email">E-mail</label>
            <div class="input-box email-field">
              <input type="email" id="email" name="email" placeholder="Type your email" required />
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-box password-field">
              <input type="password" id="password" name="password" placeholder="Type your password" required />
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" aria-pressed="false"></button>
            </div>
          </div>

          <div class="checkbox-group">
            <div class="checkbox-box">
              <input type="checkbox" id="remember" name="remember" />
              <label for="remember">Remind me</label>
            </div>
            <a href="#">Forgot password</a>
          </div>

          <button type="submit">Login</button>

          <small>Don't have an account? <a href="#">Sign up!</a></small>
        </form>

      </div>

    </div>

    <div class="login-picture">
      <img src="images/side-image.jpg" alt="">
    </div>

    <script src="./script.js"></script>

  </body>
</html>
